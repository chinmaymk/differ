name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run check

  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Caches the *installed* package files (not just the .deb archives), so a
      # hit restores webkit2gtk/gtk straight to disk instead of re-resolving
      # and unpacking ~100 packages through apt every run.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf build-essential curl wget file libxdo-dev libssl-dev
          version: 1.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Swatinem/rust-cache below only caches ~/.cargo and target/, not
      # ~/.rustup — without this, every run re-downloads the ~200MB stable
      # toolchain from scratch even though nothing about it changed.
      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: ~/.rustup
          key: rustup-${{ matrix.platform }}-stable

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.platform }}
          cache-on-failure: true

      - run: npm ci

      # --debug: this job only needs to prove the app compiles and bundles.
      # The release profile (opt-level=z, lto, codegen-units=1, no
      # incremental) is reserved for the tag-triggered release build, where
      # binary size matters — using it here would defeat rust-cache on every
      # PR push and make incremental builds slow for no benefit.
      #
      # On Linux, restrict to the .deb bundle: the debug binary carries full
      # webkit2gtk/tao debug symbols, and `tauri.conf.json`'s targets:"all"
      # otherwise also builds .rpm (xz-compresses that debug binary — ~12
      # minutes on its own) and .appimage (uncached network downloads of
      # linuxdeploy tooling). One fast bundle format is enough to prove the
      # bundling pipeline works; the release build still produces all three.
      - name: Build app (frontend + Tauri bundle)
        run: npm run tauri build -- --debug ${{ matrix.platform == 'ubuntu-22.04' && '--bundles deb' || '' }}
